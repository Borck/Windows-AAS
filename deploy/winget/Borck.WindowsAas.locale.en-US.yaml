License: MIT
LicenseUrl: https://github.com/Borck/Windows-AAS/blob/main/LICENSE
ShortDescription: Plugin-based Asset Administration Shell (AAS) for Windows hosts.
Description: >-
  Windows-AAS is a system-level Windows service that reads and writes host
  properties (displays, audio, automation) and bridges them over MQTT to an
  Asset Administration Shell hosted in a BaSyx aas-environment. It includes a
  loopback-only Blazor admin UI, a signature-verified plugin repository, and a
  built-in auto-updater.
