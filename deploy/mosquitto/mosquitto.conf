# Mosquitto broker for the Windows-AAS host <-> AAS bridge.

# Plain listener — DEVELOPMENT ONLY. Disable in production.
listener 1883
allow_anonymous true

# TLS listener — production. Provide CA + server cert/key under ./certs and
# require client credentials. See docs/INSTALL.md.
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# allow_anonymous false
# password_file /mosquitto/config/passwords
persistence true
persistence_location /mosquitto/data/
