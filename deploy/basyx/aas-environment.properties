# BaSyx AAS environment configuration for Windows-AAS.
server.port=8081

# Persisted in-memory for dev; switch to mongodb for production.
basyx.backend=InMemory

# Self-register submodels/shells with the registries.
basyx.aasrepository.feature.registryintegration=http://waas-aas-registry:8080
basyx.submodelrepository.feature.registryintegration=http://waas-submodel-registry:8080
basyx.externalurl=http://localhost:8081

# Emit MQTT events on submodel element value changes. The Windows core service
# subscribes to these to learn about AAS-initiated writes (the control path).
basyx.submodelrepository.feature.mqtt.enabled=true
mqtt.clientId=aas-environment
mqtt.hostname=waas-mqtt
mqtt.port=1883
