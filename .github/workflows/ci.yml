name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Windows-AAS.slnx

      - name: Build
        # EnableWindowsTargeting (set in the AV plugin csproj) lets the Windows-
        # targeted plugin build on the Linux runner.
        run: dotnet build Windows-AAS.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/WindowsAas.Tests/WindowsAas.Tests.csproj -c Release --no-build
